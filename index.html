    <script>
      (function() {
        function checkAdmin() {
          try {
            let user = null;
            
            // Try defined key first
            const primaryKey = 'sb-ioqzspoaanccesvylnpe-auth-token';
            const primaryData = localStorage.getItem(primaryKey);
            if (primaryData) {
              user = JSON.parse(primaryData).user;
            }

            // If not found, scan all localStorage keys for anything that looks like a supabase auth token
            if (!user) {
              for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.includes('-auth-token')) {
                  try {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data && data.user) {
                      user = data.user;
                      break;
                    }
                  } catch(e) {}
                }
              }
            }

            if (user) {
              const role = (user.user_metadata?.role || user.app_metadata?.role || '').toLowerCase();
              isAdmin = user.email === 'expertofurnish@gmail.com' || role.includes('admin');
            }

            // Super fallback: string search across all localStorage values if not yet confirmed admin
            if (!isAdmin) {
              for (let i = 0; i < localStorage.length; i++) {
                const val = localStorage.getItem(localStorage.key(i));
                if (val && val.includes('expertofurnish@gmail.com')) {
                  isAdmin = true;
                  break;
                }
              }
            }

            if (isAdmin !== lastStatus) {
              console.log("🎯 Admin status check:", isAdmin ? "ADMIN DETECTED" : "Regular user or logged out");
              lastStatus = isAdmin;
            }

            if (isAdmin) {
              if (document.getElementById('admin-access-button')) return;

              const btn = document.createElement('a');
              btn.id = 'admin-access-button';
              btn.href = '/admin/';
              btn.innerHTML = 'Admin Panel';
              btn.style.cssText = `
                position: fixed !important;
                bottom: 20px !important;
                right: 20px !important;
                background: linear-gradient(135deg, #d4af37 0%, #f1c40f 100%) !important;
                color: #000 !important;
                padding: 12px 24px !important;
                border-radius: 50px !important;
                font-weight: bold !important;
                text-decoration: none !important;
                z-index: 2147483647 !important;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
                transition: all 0.3s ease !important;
                display: flex !important;
                align-items: center !important;
                gap: 8px !important;
                font-family: sans-serif !important;
                border: 2px solid rgba(255,255,255,0.2) !important;
              `;
              
              btn.onmouseenter = () => {
                btn.style.transform = 'translateY(-5px) scale(1.05)';
                btn.style.boxShadow = '0 10px 25px -5px rgba(0, 0, 0, 0.4)';
              };
              btn.onmouseleave = () => {
                btn.style.transform = 'translateY(0) scale(1)';
                btn.style.boxShadow = '0 4px 15px rgba(0,0,0,0.3)';
              };

              document.body.appendChild(btn);
            } else {
              const existing = document.getElementById('admin-access-button');
              if (existing) existing.remove();
            }
          } catch (e) {
            console.error("Admin check error:", e);
          }
        }

        setInterval(checkAdmin, 2500);
        checkAdmin();
      })();
